services:

  quicken:
    build: ../quicken2
    ports:
      - "8000:8000"
    volumes:
      - ../quicken2/quicken2.db:/app/quicken2.db
    restart: unless-stopped

  tradejournal:
    build: ../tradejournal
    ports:
      - "8001:8000"
    volumes:
      - ../tradejournal/tradejournal.db:/app/tradejournal.db
      - ../tradejournal/uploads:/app/uploads
    restart: unless-stopped

  crypto:
    build: ../CryptoDashboard
    ports:
      - "8002:8002"
    volumes:
      - C:/Users/wayne/QUANT-SCIENCE/QSAutomate/data/qsconnect/database:/data
    environment:
      - DB_PATH=/data/crypto.duckdb
    restart: unless-stopped

  ninja:
    build: ../ninja_strat
    ports:
      - "8003:8003"
    volumes:
      - C:/Users/wayne/Documents/NinjaTrader 8/db/minute:/data:ro
    environment:
      - NINJA_DB_ROOT=/data
    restart: unless-stopped

  squeeze:
    build: ../SqueezeDashboard
    ports:
      - "8004:8000"
    volumes:
      - C:/Users/wayne/QUANT-SCIENCE/QSAutomate/data/qsconnect/database:/data:ro
    environment:
      - DB_PATH=/data/qsconnect.duckdb
      - OPTIONS_DB_PATH=/data/options.duckdb
      - HSI_DB_PATH=/data/hsi.duckdb
    restart: unless-stopped

  sector:
    build: ../SectorRelativeStrength/dashboard
    ports:
      - "8005:8000"
    volumes:
      - C:/Users/wayne/QUANT-SCIENCE/QSAutomate/data/qsconnect/database:/data:ro
    environment:
      - DB_PATH=/data/qsconnect.duckdb
    restart: unless-stopped

  arbitrage-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: arbitrage_password
      MYSQL_DATABASE: arbitrage_db
      MYSQL_USER: arbitrage_user
      MYSQL_PASSWORD: arbitrage_password
    volumes:
      - arbitrage-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    restart: unless-stopped

  arbitrage:
    build: ../arbitrage
    ports:
      - "8006:3000"
    environment:
      DB_HOST: arbitrage-db
      DB_PORT: 3306
      DB_USER: arbitrage_user
      DB_PASSWORD: arbitrage_password
      DB_NAME: arbitrage_db
      PORT: 3000
      NODE_ENV: production
    depends_on:
      arbitrage-db:
        condition: service_healthy
    restart: unless-stopped

  insiders:
    build: ../insiders
    ports:
      - "8007:9001"
    volumes:
      - C:/Users/wayne/QUANT-SCIENCE/QSAutomate/data/qsconnect/database:/data/db
    environment:
      - DB_PATH=/data/db/insider.duckdb
    restart: unless-stopped

  landing:
    build: ./nginx
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  arbitrage-mysql:
